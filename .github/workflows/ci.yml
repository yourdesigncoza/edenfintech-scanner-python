name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Validate assets
        run: PYTHONPATH=src python -m edenfintech_scanner_bootstrap.cli validate-assets

      - name: Run regression suite
        run: PYTHONPATH=src python -m edenfintech_scanner_bootstrap.cli run-regression
